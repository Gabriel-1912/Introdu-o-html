<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icone.jpg" type="image/jpg">
    <title>EAFC 26 Store</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <header>

        <div class="logo">
            <h1>EAFC 26</h1>
        </div>

        <nav>
            <a href="#">Home</a>
            <a href="#">Versões</a>
            <a href="#">Loja</a>
        </nav>

    </header>

    <!-- Banner -->

    <section class="banner">

        <div class="banner-texto">

            <h2>FAÇA O DOWNLOAD DO EAFC26</h2>

            <a href="https://www.ea.com/pt-br/games/fifa/fifa-23" target="_blank">
            <button>Jogar Agora</button>
            </a>

        </div>

    </section>

    <!-- Cards -->

    <main class="container">

        <h2 class="titulo">
            Modos de Jogo
        </h2>

        <section class="cards">

            <!-- Card 1 -->

            <div class="card">

                <img src="UltimateTeam.png" alt="Ultimate Team">

                <div class="conteudo">

                    <h3>Ultimate Team</h3>

                    <p>
                        Monte seu time dos sonhos com jogadores lendários.
                    </p>

                    <button>Saiba mais</button>

                </div>

            </div>

            <!-- Card 2 -->

            <div class="card">

                <img src="ModoCarreira.png" alt="Modo Carreira">

                <div class="conteudo">

                    <h3>Modo Carreira</h3>

                    <p>
                        Gerencie clubes e conquiste títulos históricos.
                    </p>

                    <button>Saiba mais</button>

                </div>

            </div>

            <!-- Card 3 -->

            <div class="card">

                <img src="ProClubs.png" alt="Pro Clubs">

                <div class="conteudo">

                    <h3>Pro Clubs</h3>

                    <p>
                        Chame seus amigos e jogue como um time unido.
                    </p>

                    <button>Saiba mais</button>

                </div>

            </div>

        </section>

    </main>

    <!-- Footer -->

    <footer>

        <p>
            2026 EAFC 26 - ATIVIDADE 03
        </p>

    </footer>

</body>
</html>
